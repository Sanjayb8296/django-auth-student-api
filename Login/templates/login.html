<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b14;
    --card: rgba(255, 255, 255, 0.055);
    --card-border: rgba(255, 255, 255, 0.12);
    --text: #f1f5f9;
    --text-dim: #a5b0c2;
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --danger: #f87171;
    --success: #34d399;
    --input-bg: rgba(255, 255, 255, 0.04);
    --input-border: rgba(255, 255, 255, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* ---- animated gradient orbs ---- */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 480px; height: 480px;
    background: radial-gradient(circle, #4f46e5, transparent 70%);
    top: -120px; left: -120px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #9333ea, transparent 70%);
    bottom: -140px; right: -100px;
    animation: drift2 22s ease-in-out infinite alternate;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #0ea5e9, transparent 70%);
    top: 55%; left: 12%;
    opacity: 0.3;
    animation: drift1 26s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(80px, 60px) scale(1.15); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1.1); }
    to   { transform: translate(-70px, -50px) scale(0.95); }
  }

  /* subtle grid overlay */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---- glass card ---- */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px 36px 36px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: card-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(26px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.45);
  }
  .logo svg { width: 26px; height: 26px; stroke: #fff; }

  h1 {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 14.5px;
    margin: 8px 0 26px;
    line-height: 1.5;
  }

  /* ---- tabs ---- */
  .tabs {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 26px;
  }
  .tab-pill {
    position: absolute;
    top: 4px; bottom: 4px; left: 4px;
    width: calc(50% - 4px);
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .tabs[data-mode="register"] .tab-pill { transform: translateX(100%); }
  .tab-btn {
    position: relative;
    z-index: 1;
    border: 0;
    background: transparent;
    color: var(--text-dim);
    font: inherit;
    font-size: 14.5px;
    font-weight: 600;
    padding: 11px 0;
    min-height: 44px;
    border-radius: 9px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .tab-btn[aria-selected="true"] { color: #fff; }

  /* ---- form ---- */
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .input-wrap > svg.lead {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    stroke: #64748b;
    pointer-events: none;
    transition: stroke 0.2s;
  }
  input {
    width: 100%;
    min-height: 48px;
    padding: 13px 46px 13px 44px;
    font: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input::placeholder { color: #5b6577; }
  input:focus {
    border-color: var(--accent-1);
    background: rgba(99, 102, 241, 0.07);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.22);
  }
  .input-wrap:focus-within > svg.lead { stroke: var(--accent-1); }
  input.invalid { border-color: var(--danger); }
  input.invalid:focus { box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.18); }

  .toggle-pw {
    position: absolute;
    right: 4px; top: 50%;
    transform: translateY(-50%);
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-pw:hover { background: rgba(255,255,255,0.07); }
  .toggle-pw svg { width: 18px; height: 18px; stroke: #64748b; }

  .field-error {
    display: none;
    font-size: 13px;
    color: var(--danger);
    margin-top: 6px;
  }
  .field-error.show { display: flex; align-items: center; gap: 5px; }
  .field-error svg { width: 14px; height: 14px; stroke: var(--danger); flex-shrink: 0; }

  /* ---- banner (server messages) ---- */
  .banner {
    display: none;
    align-items: center;
    gap: 9px;
    font-size: 13.5px;
    font-weight: 500;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 18px;
  }
  .banner svg { width: 17px; height: 17px; flex-shrink: 0; }
  .banner.error {
    display: flex;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: #fca5a5;
    animation: shake 0.4s;
  }
  .banner.error svg { stroke: #fca5a5; }
  .banner.success {
    display: flex;
    background: rgba(52, 211, 153, 0.1);
    border: 1px solid rgba(52, 211, 153, 0.3);
    color: #6ee7b7;
  }
  .banner.success svg { stroke: #6ee7b7; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-7px); }
    75% { transform: translateX(7px); }
  }

  /* ---- submit button ---- */
  .submit {
    width: 100%;
    min-height: 50px;
    border: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    font: inherit;
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    box-shadow: 0 10px 28px rgba(99, 102, 241, 0.4);
    transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
  }
  .submit:hover { filter: brightness(1.12); box-shadow: 0 12px 34px rgba(99, 102, 241, 0.5); }
  .submit:active { transform: scale(0.975); }
  .submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
  .submit svg { width: 18px; height: 18px; stroke: #fff; }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin-top: 22px;
    line-height: 1.6;
  }
  .hint code {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 2px 7px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  @media (max-width: 420px) {
    .card { padding: 32px 22px 28px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="card">
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
    </svg>
  </div>

  <h1 id="title">Welcome back</h1>
  <p class="subtitle" id="subtitle">Sign in to the Student Portal</p>

  <div class="tabs" id="tabs" role="tablist" data-mode="login">
    <div class="tab-pill" aria-hidden="true"></div>
    <button class="tab-btn" id="tab-login" role="tab" aria-selected="true" type="button">Sign in</button>
    <button class="tab-btn" id="tab-register" role="tab" aria-selected="false" type="button">Create account</button>
  </div>

  <div class="banner" id="banner" role="alert" aria-live="polite"></div>

  <form id="auth-form" novalidate>
    {% csrf_token %}

    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="username" name="username" placeholder="e.g. prashant"
               autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>
      <p class="field-error" id="username-error">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span></span>
      </p>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" name="password" placeholder="Your password"
               autocomplete="current-password">
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
          <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <p class="field-error" id="password-error">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span></span>
      </p>
    </div>

    <button type="submit" class="submit" id="submit-btn">
      <span id="btn-label">Sign in</span>
      <svg id="btn-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </form>

  <p class="hint">Demo account — username <code>demo</code> · password <code>demo1234</code></p>
</main>

<script>
  // ---------- state: are we signing in, or creating an account? ----------
  let mode = "login";

  const tabs      = document.getElementById("tabs");
  const tabLogin  = document.getElementById("tab-login");
  const tabReg    = document.getElementById("tab-register");
  const title     = document.getElementById("title");
  const subtitle  = document.getElementById("subtitle");
  const btnLabel  = document.getElementById("btn-label");
  const banner    = document.getElementById("banner");
  const form      = document.getElementById("auth-form");
  const submitBtn = document.getElementById("submit-btn");
  const username  = document.getElementById("username");
  const password  = document.getElementById("password");

  function setMode(next) {
    mode = next;
    tabs.dataset.mode = next;
    tabLogin.setAttribute("aria-selected", next === "login");
    tabReg.setAttribute("aria-selected", next === "register");
    title.textContent    = next === "login" ? "Welcome back" : "Create your account";
    subtitle.textContent = next === "login" ? "Sign in to the Student Portal" : "Join the Student Portal in seconds";
    btnLabel.textContent = next === "login" ? "Sign in" : "Create account";
    password.autocomplete = next === "login" ? "current-password" : "new-password";
    clearMessages();
  }
  tabLogin.addEventListener("click", () => setMode("login"));
  tabReg.addEventListener("click", () => setMode("register"));

  // ---------- show / hide password ----------
  document.getElementById("toggle-pw").addEventListener("click", function () {
    const hidden = password.type === "password";
    password.type = hidden ? "text" : "password";
    document.getElementById("eye-open").style.display  = hidden ? "none" : "block";
    document.getElementById("eye-closed").style.display = hidden ? "block" : "none";
    this.setAttribute("aria-label", hidden ? "Hide password" : "Show password");
  });

  // ---------- little helpers for showing errors ----------
  function fieldError(input, msg) {
    const p = document.getElementById(input.id + "-error");
    p.querySelector("span").textContent = msg;
    p.classList.add("show");
    input.classList.add("invalid");
  }
  function clearMessages() {
    banner.className = "banner";
    banner.innerHTML = "";
    for (const input of [username, password]) {
      input.classList.remove("invalid");
      document.getElementById(input.id + "-error").classList.remove("show");
    }
  }
  function showBanner(type, msg) {
    const icon = type === "success"
      ? '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    banner.className = "banner " + type;
    banner.innerHTML = icon + "<span>" + msg + "</span>";
  }

  // ---------- submit: send the form to Django as JSON ----------
  form.addEventListener("submit", async function (event) {
    event.preventDefault();          // stop the browser's default page reload
    clearMessages();

    // simple front-end validation before we bother the server
    let valid = true;
    if (!username.value.trim()) { fieldError(username, "Please enter your username"); valid = false; }
    if (!password.value)        { fieldError(password, "Please enter your password"); valid = false; }
    if (mode === "register" && password.value && password.value.length < 8) {
      fieldError(password, "Password must be at least 8 characters");
      valid = false;
    }
    if (!valid) return;

    // loading state on the button
    submitBtn.disabled = true;
    document.getElementById("btn-arrow").style.display = "none";
    btnLabel.innerHTML = '<span class="spinner"></span>';

    // Django's CSRF protection: read the token the template put in the form,
    // and send it back in a header so Django trusts this request.
    const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;
    const url = mode === "login" ? "/api/login/" : "/api/register/";

    try {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken,
        },
        body: JSON.stringify({
          username: username.value.trim(),
          password: password.value,
        }),
      });

      const data = await response.json();

      if (response.ok) {
        showBanner("success", data.message + " Redirecting…");
        setTimeout(() => { window.location.href = "/dashboard/"; }, 900);
        return;
      }
      showBanner("error", data.message);
    } catch (err) {
      showBanner("error", "Could not reach the server. Is it running?");
    }

    // restore the button
    submitBtn.disabled = false;
    document.getElementById("btn-arrow").style.display = "block";
    btnLabel.textContent = mode === "login" ? "Sign in" : "Create account";
  });
</script>
</body>
</html>
