<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b14;
    --card: rgba(255, 255, 255, 0.055);
    --card-border: rgba(255, 255, 255, 0.12);
    --text: #f1f5f9;
    --text-dim: #a5b0c2;
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --success: #34d399;
    --danger: #f87171;
    --input-bg: rgba(255, 255, 255, 0.04);
    --input-border: rgba(255, 255, 255, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    position: relative;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #4f46e5, transparent 70%); top: -180px; left: -140px; }
  .orb-2 { width: 440px; height: 440px; background: radial-gradient(circle, #9333ea, transparent 70%); bottom: -180px; right: -120px; }

  /* ---- top nav ---- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: rgba(7, 11, 20, 0.75);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .brand-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
  }
  .brand-icon svg { width: 18px; height: 18px; stroke: #fff; }

  .nav-right { display: flex; align-items: center; gap: 12px; }
  .user-chip {
    display: flex; align-items: center; gap: 9px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 7px 15px 7px 8px;
    font-size: 13.5px;
    font-weight: 600;
  }
  .avatar {
    width: 27px; height: 27px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12.5px; font-weight: 700; color: #fff;
    text-transform: uppercase;
  }
  .logout-btn {
    display: flex; align-items: center; gap: 7px;
    min-height: 41px;
    padding: 9px 16px;
    font: inherit; font-size: 13.5px; font-weight: 600;
    color: #fca5a5;
    background: rgba(248, 113, 113, 0.09);
    border: 1px solid rgba(248, 113, 113, 0.25);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .logout-btn:hover { background: rgba(248, 113, 113, 0.18); }
  .logout-btn:active { transform: scale(0.96); }
  .logout-btn svg { width: 15px; height: 15px; stroke: #fca5a5; }

  /* ---- layout ---- */
  .page {
    position: relative;
    z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 24px 64px;
  }
  .welcome h1 { font-size: 27px; font-weight: 800; letter-spacing: -0.02em; }
  .welcome h1 span { background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .welcome p { color: var(--text-dim); font-size: 14.5px; margin-top: 6px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin: 28px 0;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 20px 22px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .stat .label { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 13px; font-weight: 600; }
  .stat .label svg { width: 16px; height: 16px; stroke: #818cf8; }
  .stat .value { font-size: 30px; font-weight: 800; margin-top: 8px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }

  .grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .panel-head h2 { font-size: 15.5px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
  .panel-head h2 svg { width: 17px; height: 17px; stroke: #818cf8; }
  .pill {
    font-size: 12px; font-weight: 700;
    color: #a5b4fc;
    background: rgba(99, 102, 241, 0.14);
    border: 1px solid rgba(99, 102, 241, 0.3);
    padding: 3px 11px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }

  /* ---- table ---- */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    text-align: left;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #64748b;
    padding: 12px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  td { padding: 13px 22px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); white-space: nowrap; }
  td:first-child { color: var(--text); font-weight: 600; }
  tr:last-child td { border-bottom: 0; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.035); }
  .course-tag {
    font-size: 12px; font-weight: 600;
    color: #c4b5fd;
    background: rgba(168, 85, 247, 0.13);
    border: 1px solid rgba(168, 85, 247, 0.28);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .empty {
    padding: 44px 22px;
    text-align: center;
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
  }
  .empty svg { width: 34px; height: 34px; stroke: #475569; margin-bottom: 10px; }

  /* ---- form ---- */
  .form-body { padding: 20px 22px 22px; }
  .field { margin-bottom: 15px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
  input {
    width: 100%;
    min-height: 45px;
    padding: 11px 14px;
    font: inherit; font-size: 14.5px;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 11px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: #5b6577; }
  input:focus {
    border-color: var(--accent-1);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .add-btn {
    width: 100%;
    min-height: 47px;
    margin-top: 4px;
    border: 0;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    font: inherit; font-size: 14.5px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 22px rgba(99, 102, 241, 0.35);
    transition: transform 0.15s, filter 0.2s;
  }
  .add-btn:hover { filter: brightness(1.12); }
  .add-btn:active { transform: scale(0.975); }
  .add-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .add-btn svg { width: 17px; height: 17px; stroke: #fff; }

  .form-msg { display: none; font-size: 13px; font-weight: 500; margin-top: 12px; padding: 10px 13px; border-radius: 10px; }
  .form-msg.success { display: block; color: #6ee7b7; background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.3); }
  .form-msg.error { display: block; color: #fca5a5; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); }

  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes row-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  tbody tr { animation: row-in 0.3s ease-out both; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="nav">
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
      </svg>
    </div>
    Student Portal
  </div>
  <div class="nav-right">
    <div class="user-chip">
      <div class="avatar">{{ user.username|first }}</div>
      {{ user.username }}
    </div>
    <button class="logout-btn" id="logout-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Log out
    </button>
  </div>
</nav>

<main class="page">
  <div class="welcome">
    <h1>Hello, <span>{{ user.username }}</span>
    </h1>
    <p>You are logged in. This data comes live from your Django API.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Total students
      </div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat">
      <div class="label">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Courses
      </div>
      <div class="value" id="stat-courses">—</div>
    </div>
    <div class="stat">
      <div class="label">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Average age
      </div>
      <div class="value" id="stat-age">—</div>
    </div>
  </div>

  <div class="grid">
    <section class="panel">
      <div class="panel-head">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Students
        </h2>
        <span class="pill" id="count-pill">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Age</th><th>Email</th><th>Course</th></tr>
          </thead>
          <tbody id="student-rows"></tbody>
        </table>
        <div class="empty" id="empty-state" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <div>No students yet.<br>Add the first one using the form.</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Add student
        </h2>
      </div>
      <form class="form-body" id="student-form">
        <div class="field">
          <label for="s-name">Full name</label>
          <input id="s-name" placeholder="e.g. Ananya Sharma" required>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="s-age">Age</label>
            <input id="s-age" type="number" min="1" max="120" placeholder="21" required>
          </div>
          <div class="field">
            <label for="s-course">Course</label>
            <input id="s-course" placeholder="Python" required>
          </div>
        </div>
        <div class="field">
          <label for="s-email">Email</label>
          <input id="s-email" type="email" placeholder="ananya@example.com" required>
        </div>
        <button type="submit" class="add-btn" id="add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="add-label">Add student</span>
        </button>
        <div class="form-msg" id="form-msg"></div>
      </form>
    </section>
  </div>
</main>

<script>
  // ---------- load students from OUR Django API ----------
  async function loadStudents() {
    const response = await fetch("/api/students/");   // GET → student_api view
    const students = await response.json();

    const tbody = document.getElementById("student-rows");
    tbody.innerHTML = "";

    for (const s of students) {
      const tr = document.createElement("tr");
      const cells = [s.name, s.age, s.email];
      for (const value of cells) {
        const td = document.createElement("td");
        td.textContent = value;   // textContent keeps us safe from HTML injection
        tr.appendChild(td);
      }
      const courseTd = document.createElement("td");
      const tag = document.createElement("span");
      tag.className = "course-tag";
      tag.textContent = s.course;
      courseTd.appendChild(tag);
      tr.appendChild(courseTd);
      tbody.appendChild(tr);
    }

    document.getElementById("empty-state").style.display = students.length ? "none" : "block";
    document.getElementById("count-pill").textContent = students.length;

    // little stats
    document.getElementById("stat-total").textContent = students.length;
    document.getElementById("stat-courses").textContent = new Set(students.map(s => s.course)).size;
    document.getElementById("stat-age").textContent = students.length
      ? Math.round(students.reduce((sum, s) => sum + s.age, 0) / students.length)
      : "—";
  }

  loadStudents();

  // ---------- add a student (POST to the same API) ----------
  document.getElementById("student-form").addEventListener("submit", async function (event) {
    event.preventDefault();

    const btn = document.getElementById("add-btn");
    const label = document.getElementById("add-label");
    const msg = document.getElementById("form-msg");
    msg.className = "form-msg";

    btn.disabled = true;
    label.innerHTML = '<span class="spinner"></span>';

    try {
      const response = await fetch("/api/students/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name:   document.getElementById("s-name").value.trim(),
          age:    Number(document.getElementById("s-age").value),
          email:  document.getElementById("s-email").value.trim(),
          course: document.getElementById("s-course").value.trim(),
        }),
      });

      if (response.ok) {
        msg.className = "form-msg success";
        msg.textContent = "Student added!";
        this.reset();
        loadStudents();   // refresh the table
      } else {
        msg.className = "form-msg error";
        msg.textContent = "Could not add student (is the email unique?)";
      }
    } catch (err) {
      msg.className = "form-msg error";
      msg.textContent = "Could not reach the server.";
    }

    btn.disabled = false;
    label.textContent = "Add student";
    setTimeout(() => { msg.className = "form-msg"; }, 3500);
  });

  // ---------- logout ----------
  document.getElementById("logout-btn").addEventListener("click", async function () {
    await fetch("/api/logout/");        // tells Django to clear the session
    window.location.href = "/";         // back to the login page
  });
</script>
</body>
</html>
